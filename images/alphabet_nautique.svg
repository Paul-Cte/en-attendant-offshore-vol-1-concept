  </g>

  <g transform="translate(160, 0)">
    <rect x="0" y="0" width="30" height="30" fill="#000000" />
    <rect x="30" y="30" width="30" height="30" fill="#000000" />
    <rect x="30" y="0" width="30" height="30" fill="#c0333b" />
    <rect x="0" y="30" width="30" height="30" fill="#c0333b" />
    <rect width="60" height="60" fill="none" stroke="#c0333b" stroke-width="2" />
  </g>

</svg>
